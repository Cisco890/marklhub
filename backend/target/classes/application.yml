spring:
  application:
    name: markhub-backend
  datasource:
    # Railway: add DATABASE_URL from the Postgres service (postgresql://... is converted at startup).
    # Or set jdbc:postgresql://host:port/db plus DATABASE_USERNAME / DATABASE_PASSWORD yourself.
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/markhub}
    username: ${DATABASE_USERNAME:markhub}
    password: ${DATABASE_PASSWORD:markhub}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

markhub:
  cors:
    # Comma-separated origin patterns for browsers (e.g. https://your-frontend.up.railway.app). Local dev defaults are always allowed.
    additional-allowed-origin-patterns: ${MARKHUB_CORS_ORIGINS:}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-use-long-random-string-in-production-min-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  bootstrap:
    admin-username: ${MARKHUB_ADMIN_USERNAME:admin}
    admin-password: ${MARKHUB_ADMIN_PASSWORD:password123}

logging:
  level:
    org.springframework.security: INFO
